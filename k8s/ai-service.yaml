apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: spend-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: spend-control/ai-service:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: spend-control-config
            - secretRef:
                name: spend-control-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: spend-control
spec:
  selector:
    app: ai-service
  ports:
    - port: 8002
      targetPort: 8002

