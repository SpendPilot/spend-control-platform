apiVersion: batch/v1
kind: Job
metadata:
  name: control-migrations
  namespace: spend-control
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: control-migrations
          image: spend-control/control-service:latest
          workingDir: /app
          command: ["sh", "-c", "alembic upgrade head"]
          envFrom:
            - configMapRef:
                name: spend-control-config
            - secretRef:
                name: spend-control-secrets
---
