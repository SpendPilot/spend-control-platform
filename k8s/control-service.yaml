apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-service
  namespace: spend-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-service
  template:
    metadata:
      labels:
        app: control-service
    spec:
      containers:
        - name: control-service
          image: spend-control/control-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: spend-control-config
            - secretRef:
                name: spend-control-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: control-service
  namespace: spend-control
spec:
  selector:
    app: control-service
  ports:
    - port: 8000
      targetPort: 8000

