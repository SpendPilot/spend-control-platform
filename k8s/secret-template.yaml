apiVersion: v1
kind: Secret
metadata:
  name: spend-control-secrets
  namespace: spend-control
type: Opaque
stringData:
  JWT_SECRET_KEY: "replace-this-secret"
  POSTGRES_PASSWORD: "replace-this-password"
  DATABASE_URL: "postgresql+psycopg://spendcontrol:replace-this-password@postgres:5432/spend_control"
