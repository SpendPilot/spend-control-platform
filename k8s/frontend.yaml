apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: spend-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: spend-control/frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: spend-control-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: spend-control
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000

